<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Master Manager</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>

        <div class="auth-card">
            <div class="bear-mascot">
                <div class="bear-face">
                    <div class="bear-ears"></div>
                    <div class="bear-eyes">
                        <div class="eye l-eye"></div>
                        <div class="eye r-eye"></div>
                    </div>
                    <div class="bear-nose"></div>
                </div>
                <div class="bear-paws">
                    <div class="paw l-paw"></div>
                    <div class="paw r-paw"></div>
                </div>
            </div>

            <div class="role-selector">
                <div class="role-option active" data-role="student">STUDENT</div>
                <div class="role-option" data-role="doctor">DOCTOR</div>
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <input type="email" id="email" placeholder="Email Address" required>
                </div>
                <div class="input-group" style="position: relative;">
                    <input type="password" id="password" placeholder="Password" required style="padding-right: 50px;">
                    <span id="togglePassword" style="position: absolute; right: 15px; top: 50%; transform: translateY(-75%); cursor: pointer; font-size: 20px; z-index: 100;">
                        👁️
                    </span>
                </div>
                <div class="extra-actions">
                    <a href="forget-password.html" class="forgot-link">Forgot Security Key?</a>
                </div>
                <button type="submit" class="login-btn" id="loginBtn">
                    <span class="btn-text">INITIALIZE SYSTEM</span>
                </button>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
