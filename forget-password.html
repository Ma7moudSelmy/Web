<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استعادة الوصول | Project Manager</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        /* إضافات خاصة بصفحة الاستعادة لضمان الـ UI الجامد */
        .reset-header { text-align: center; margin-bottom: 30px; }
        .reset-header h2 { font-weight: 900; font-size: 24px; color: #fff; margin-bottom: 10px; }
        .reset-header p { color: #8b949e; font-size: 13px; line-height: 1.6; }
        
        .success-box { 
            display: none; text-align: center; animation: fadeIn 0.5s ease;
        }
        .success-icon { 
            width: 80px; height: 80px; background: rgba(16, 185, 129, 0.1); 
            color: #10b981; border-radius: 50%; display: flex; 
            justify-content: center; align-items: center; font-size: 40px; margin: 0 auto 20px;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* لودر التحقق */
        .verifying { display: none; text-align: center; color: #6366f1; font-weight: bold; margin-bottom: 20px; font-size: 14px; }
        .spinner-small { 
            width: 20px; height: 20px; border: 2px solid rgba(99, 102, 241, 0.2); 
            border-top-color: #6366f1; border-radius: 50%; display: inline-block; 
            animation: spin 0.8s linear infinite; vertical-align: middle; margin-left: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>

        <div class="auth-card">
            <div class="bear-mascot">
                <div class="bear-face">
                    <div class="bear-ears"></div>
                    <div class="bear-eyes">
                        <div class="eye l-eye"></div>
                        <div class="eye r-eye"></div>
                    </div>
                    <div class="bear-nose"></div>
                </div>
                <div class="bear-paws">
                    <div class="paw l-paw"></div>
                    <div class="paw r-paw"></div>
                </div>
            </div>

            <div id="resetFormContent">
                <div class="reset-header">
                    <h2>استعادة الوصول</h2>
                    <p>أدخل بريدك الجامعي المسجل لإرسال <br><b>مفتاح الأمان الجديد</b></p>
                </div>

                <div class="input-group">
                    <input type="email" id="resetEmail" placeholder="name@university.edu" required style="direction: ltr; text-align: left;">
                </div>

                <div id="verifyStatus" class="verifying">
                    <span class="spinner-small"></span> جاري التحقق من الحساب...
                </div>

                <button class="login-btn" id="sendBtn" onclick="handleReset()">
                    إرسال رابط الاستعادة
                </button>
            </div>

            <div id="successContent" class="success-box">
                <div class="success-icon">✔️</div>
                <h3 style="color: #fff; margin-bottom: 10px;">تم الإرسال بنجاح!</h3>
                <p style="color: #8b949e; font-size: 13px; margin-bottom: 25px;">
                    لقد أرسلنا رابطاً يحتوي على مفتاح الأمان الجديد إلى بريدك الإلكتروني. يرجى التحقق من صندوق الوارد.
                </p>
                <button class="login-btn" onclick="window.location.href='login.html'" style="background: rgba(255,255,255,0.05); border: 1px solid #6366f1;">
                    العودة لتسجيل الدخول
                </button>
            </div>

            <p style="text-align:center; margin-top:25px;" id="backLink">
                <a href="login.html" style="color:#6366f1; text-decoration:none; font-size:12px; font-weight: bold;">
                    ← العودة للدخول
                </a>
            </p>
        </div>
    </div>

    <script>
        function handleReset() {
            const email = document.getElementById('resetEmail').value;
            const sendBtn = document.getElementById('sendBtn');
            const verifyStatus = document.getElementById('verifyStatus');
            const formContent = document.getElementById('resetFormContent');
            const successContent = document.getElementById('successContent');
            const mascot = document.querySelector('.bear-mascot');
            const backLink = document.getElementById('backLink');

            if (!email || !email.includes('@')) {
                alert("برجاء إدخال بريد إلكتروني صحيح");
                return;
            }

            // 1. بداية الأنيمايشن والتحقق
            sendBtn.disabled = true;
            sendBtn.style.opacity = "0.5";
            sendBtn.innerText = "جاري المعالجة...";
            verifyStatus.style.display = "block";
            
            // جعل الدب يغطي عينه بانتظار (حالة تفكير)
            mascot.classList.add('cover-eyes');

            // 2. محاكاة الـ API (تأخير 2 ثانية)
            setTimeout(() => {
                // إخفاء الفورم وإظهار رسالة النجاح
                formContent.style.display = "none";
                backLink.style.display = "none";
                successContent.style.display = "block";
                
                // الدب يفتح عينه فرحاً بالنجاح
                mascot.classList.remove('cover-eyes');
                
                // تخزين الحالة في الـ LocalStorage (كأننا بعتنا فعلاً)
                localStorage.setItem('LAST_RESET_EMAIL', email);
                console.log("Reset link sent to: " + email);
                
            }, 2500);
        }
    </script>
</body>
</html>
