<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>Login | Project Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>

        <div class="auth-card">
            <div class="bear-mascot">
                <div class="bear-face">
                    <div class="bear-ears"></div>
                    <div class="bear-eyes">
                        <div class="eye l-eye"></div>
                        <div class="eye r-eye"></div>
                    </div>
                    <div class="bear-nose"></div>
                </div>
                <div class="bear-paws">
                    <div class="paw l-paw"></div>
                    <div class="paw r-paw"></div>
                </div>
            </div>

            <div class="role-selector">
                <div class="role-option active" data-role="student">STUDENT</div>
                <div class="role-option" data-role="doctor">DOCTOR</div>
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <input type="email" id="email" placeholder="Email Address" required style="direction: ltr;">
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Password" required style="direction: ltr;">
                </div>
                <div class="extra-actions">
                    <a href="forget-password.html" class="forgot-link">Forgot Security Key?</a>
                </div>
                <button type="submit" class="login-btn" id="loginBtn">
                    <span class="btn-text">INITIALIZE SYSTEM</span>
                    <div class="loader" id="loader"></div>
                </button>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
